# Pre-commit hooks for Universal Runtime Guard
#
# Install:   pip install pre-commit && pre-commit install
# Run once:  pre-commit run --all-files

repos:
  # --- Python code quality ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: debug-statements

  # --- Import sorting ---
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile=black", "--line-length=88"]

  # --- Guard audit (custom) ---
  - repo: local
    hooks:
      - id: guard-audit
        name: guard audit
        entry: python -m guard audit
        language: python
        pass_filenames: false
        always_run: true

  # --- Tests ---
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: python -m pytest tests/ -x -q
        language: python
        pass_filenames: false
        stages: [pre-push]
